name: Docker Build and Publish (Fork)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ vars.FORK_IMAGE_NAME || format('ghcr.io/{0}/hermes-agent', github.repository_owner) }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          image_name_lower="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=${image_name_lower}" >> "$GITHUB_OUTPUT"

      - name: Build image for smoke test
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.image_name }}:test
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}

      - name: Smoke test image
        uses: ./.github/actions/hermes-smoke-test
        with:
          image: ${{ steps.image.outputs.image_name }}:test

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          short_sha6="${GITHUB_SHA::6}"
          {
            echo "tag_main=${IMAGE_NAME_LOWER}:main"
            echo "tag_latest=${IMAGE_NAME_LOWER}:latest"
            echo "tag_sha=${IMAGE_NAME_LOWER}:sha-${short_sha}"
            echo "tag_sha_short=${IMAGE_NAME_LOWER}:sha-${short_sha6}"
          } >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME_LOWER: ${{ steps.image.outputs.image_name }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tags.outputs.tag_main }}
            ${{ steps.tags.outputs.tag_latest }}
            ${{ steps.tags.outputs.tag_sha }}
            ${{ steps.tags.outputs.tag_sha_short }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
